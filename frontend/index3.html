<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub File Uploader - CDN Only</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        .upload-area:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        .upload-area.drag-over {
            border-color: #667eea;
            background: #e8ebff;
        }
        .file-input {
            display: none;
        }
        .file-info {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .progress {
            margin-top: 20px;
            display: none;
        }
        .progress-bar {
            background: #f0f0f0;
            border-radius: 10px;
            overflow: hidden;
            height: 20px;
        }
        .progress-fill {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            height: 100%;
            transition: width 0.3s;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        .info {
            background: #e7f3ff;
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            margin-top: 20px;
            color: #0066cc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 GitHub File Uploader</h1>
        <div class="subtitle">Upload files directly to GitHub (CDN-only)</div>
        
        <div class="upload-area" id="uploadArea">
            <div>📁 Click or drag files here</div>
            <div style="font-size: 12px; margin-top: 10px; color: #999;">
                Files will be uploaded to GitHub repository
            </div>
        </div>
        <input type="file" id="fileInput" class="file-input" multiple>
        
        <div class="file-info" id="fileInfo">
            <div class="file-name" id="fileName"></div>
            <div class="file-size" id="fileSize"></div>
        </div>
        
        <button id="uploadBtn" disabled>Upload to GitHub</button>
        
        <div class="progress" id="progress">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div style="margin-top: 10px; font-size: 12px; text-align: center;" id="progressText">0%</div>
        </div>
        
        <div class="status" id="status"></div>
        
        <div class="info">
            💡 Files are stored in your GitHub repository under <strong>/uploads/</strong> folder<br>
            🔗 Files are immediately available via CDN
        </div>
    </div>

    <script>
        // GitHub Configuration - UPDATE THESE VALUES
        const GITHUB_TOKEN = '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';  // Replace with your token
        const REPO_OWNER = 'redtestredtest4-hue';
        const REPO_NAME = 'file-uploader-cdn';
        const BRANCH = 'master';
        
        let selectedFiles = [];
        
        // DOM Elements
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const uploadBtn = document.getElementById('uploadBtn');
        const progress = document.getElementById('progress');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const statusDiv = document.getElementById('status');
        
        // Drag and drop handlers
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('drag-over');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('drag-over');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');
            handleFiles(e.dataTransfer.files);
        });
        
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });
        
        function handleFiles(files) {
            selectedFiles = Array.from(files);
            if (selectedFiles.length > 0) {
                const file = selectedFiles[0];
                fileName.textContent = file.name;
                fileSize.textContent = formatBytes(file.size);
                fileInfo.style.display = 'block';
                uploadBtn.disabled = false;
                
                // GitHub has file size limit (100MB for repos, but we'll limit to 25MB)
                if (file.size > 25 * 1024 * 1024) {
                    showStatus('File too large! Max 25MB for GitHub', 'error');
                    uploadBtn.disabled = true;
                }
            } else {
                fileInfo.style.display = 'none';
                uploadBtn.disabled = true;
            }
        }
        
        uploadBtn.addEventListener('click', () => {
            if (selectedFiles.length > 0) {
                uploadToGitHub(selectedFiles[0]);
            }
        });
        
        async function uploadToGitHub(file) {
            progress.style.display = 'block';
            uploadBtn.disabled = true;
            hideStatus();
            
            // Create a unique filename with date
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
            const filePath = `uploads/${timestamp}_${file.name}`;
            
            try {
                // Read file as base64
                const base64Content = await readFileAsBase64(file);
                
                // Prepare GitHub API request
                const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${filePath}`;
                
                // Check if file exists (optional, to avoid overwriting)
                let sha = null;
                try {
                    const checkResponse = await fetch(url, {
                        headers: {
                            'Authorization': `token ${GITHUB_TOKEN}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    });
                    if (checkResponse.ok) {
                        const existing = await checkResponse.json();
                        sha = existing.sha;
                    }
                } catch(e) {
                    // File doesn't exist, that's fine
                }
                
                // Create or update file on GitHub
                const response = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({
                        message: `Upload ${file.name} via web uploader`,
                        content: base64Content.split(',')[1], // Remove data:image... prefix
                        branch: BRANCH,
                        sha: sha
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    const cdnUrl = `https://cdn.jsdelivr.net/gh/${REPO_OWNER}/${REPO_NAME}@${BRANCH}/${filePath}`;
                    showStatus(`✅ ${file.name} uploaded successfully!`, 'success');
                    progressFill.style.width = '100%';
                    progressText.textContent = '100%';
                    
                    // Add download link
                    statusDiv.innerHTML += `<div style="margin-top: 10px;">📥 <a href="${cdnUrl}" target="_blank">View on CDN</a></div>`;
                } else {
                    const error = await response.json();
                    showStatus(`❌ Upload failed: ${error.message}`, 'error');
                }
            } catch (error) {
                console.error('Upload error:', error);
                showStatus(`❌ Upload failed: ${error.message}`, 'error');
            } finally {
                setTimeout(() => {
                    progress.style.display = 'none';
                    progressFill.style.width = '0%';
                    progressText.textContent = '0%';
                    uploadBtn.disabled = false;
                }, 3000);
            }
        }
        
        function readFileAsBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                
                // Simulate progress
                reader.onprogress = (e) => {
                    if (e.lengthComputable) {
                        const percent = (e.loaded / e.total) * 100;
                        progressFill.style.width = percent + '%';
                        progressText.textContent = Math.round(percent) + '%';
                    }
                };
                
                reader.readAsDataURL(file);
            });
        }
        
        function showStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            setTimeout(() => {
                if (statusDiv.className.includes(type)) {
                    statusDiv.style.display = 'none';
                }
            }, 10000);
        }
        
        function hideStatus() {
            statusDiv.style.display = 'none';
        }
        
        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        // Test GitHub connection on load
        async function testGitHubConnection() {
            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}`, {
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                if (response.ok) {
                    console.log('✅ GitHub connection successful');
                } else {
                    console.error('❌ GitHub connection failed');
                    showStatus('⚠️ GitHub token not configured. Update GITHUB_TOKEN in the code.', 'error');
                }
            } catch (error) {
                console.error('Connection error:', error);
            }
        }
        
        testGitHubConnection();
    </script>
</body>
</html>
